apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
spec:
  template:
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["k6", "run", "-e", "WEBSOCKET_URL=ws://websocket-service:3000", "/scripts/websocket-test.js"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: k6-script
      restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  websocket-test.js: |
    import ws from "k6/ws";
    export const options = { vus: 50, duration: "30s" };
    export default function () {
      const url = __ENV.WEBSOCKET_URL;
      const res = ws.connect(url, {}, function (socket) {
        socket.on("open", () => socket.send(JSON.stringify({ type: "join-room", room: "loadtest" })));
        socket.setInterval(() => {
          socket.send(JSON.stringify({ type: "send-message", text: "hello from k6" }));
        }, 0.5);
      });
    }