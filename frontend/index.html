<!DOCTYPE html>
<html>
<head>
    <title>Chat • Real‑time</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1e1f2c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: #2d2f3e;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px 24px;
            background: #3b3f5c;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            border-bottom: 1px solid #4a4e6b;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #242637;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        .message.own {
            align-self: flex-end;
            background: #4f8cff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #3b3f5c;
            color: #eee;
            border-bottom-left-radius: 4px;
        }
        .message .username {
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        .message .text {
            line-height: 1.4;
        }
        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: #2d2f3e;
            border-top: 1px solid #3b3f5c;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            background: #1e1f2c;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-area button {
            background: #4f8cff;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover {
            background: #3a6fdf;
        }
        .status {
            text-align: center;
            font-size: 0.8rem;
            padding: 8px;
            background: #1e1f2c;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        💬 Real‑time Chat · Room: general
    </div>
    <div class="messages-area" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
    <div class="status" id="status">🔌 Connecting...</div>
</div>

<script>
    // Determine WebSocket URL based on environment
    const socketUrl = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'ws://localhost:3000'
        : `ws://${window.location.hostname}:3000`;  // for NodePort, but we'll use port-forward

    console.log(`Connecting to ${socketUrl}`);
    const socket = io(socketUrl, { auth: { token: 'demo' } });

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const statusDiv = document.getElementById('status');

    socket.on('connect', () => {
        console.log('✅ Connected');
        statusDiv.innerHTML = '✅ Connected · Type a message';
        socket.emit('join-room', 'general');
    });

    socket.on('connect_error', (err) => {
        console.error('❌ Connection error:', err.message);
        statusDiv.innerHTML = `❌ Connection failed: ${err.message}`;
    });

    socket.on('message', (data) => {
        console.log('📨 Message received:', data);
        const isOwn = data.user === 'You';
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
        messageDiv.innerHTML = `<div class="username">${escapeHtml(data.user)}</div><div class="text">${escapeHtml(data.text)}</div>`;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        console.log('📤 Sending:', text);
        socket.emit('send-message', { room: 'general', user: 'You', text });
        input.value = '';
        input.focus();
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
